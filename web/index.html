<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Organizador — Wendel Castro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0a0a0f;
  --bg-surface: #111118;
  --bg-card: rgba(255,255,255,0.03);
  --bg-glass: rgba(255,255,255,0.05);
  --border-subtle: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text-primary: #e8e6f0;
  --text-secondary: rgba(232,230,240,0.55);
  --text-muted: rgba(232,230,240,0.3);
  --cat-trabalho: #f97316;
  --cat-consultoria: #06b6d4;
  --cat-grupo-ser: #a855f7;
  --cat-pessoal: #22c55e;
  --pri-alta: #ef4444;
  --pri-media: #f59e0b;
  --pri-baixa: #64748b;
  --radius: 14px;
  --radius-sm: 8px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { font-size: 15px; -webkit-text-size-adjust: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ========== BACKGROUND ========== */
body::before {
  content: '';
  position: fixed;
  top: -40%; left: -20%;
  width: 80vw; height: 80vw;
  background: radial-gradient(circle, rgba(168,85,247,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -30%; right: -10%;
  width: 60vw; height: 60vw;
  background: radial-gradient(circle, rgba(6,182,212,0.05) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

.noise {
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 1;
}

/* ========== LAYOUT — MOBILE FIRST ========== */
.app {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: calc(70px + var(--safe-bottom));
}

/* ========== HEADER ========== */
.header {
  position: sticky;
  top: 0;
  z-index: 20;
  padding: calc(0.75rem + var(--safe-top)) 1rem 0.75rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-subtle);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(10,10,15,0.85);
}

.header-left { display: flex; align-items: baseline; gap: 0.6rem; }

.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.5rem;
  font-style: italic;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--cat-consultoria) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-date {
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-weight: 300;
  display: none;
}

.header-right { display: flex; align-items: center; gap: 0.5rem; }

.btn-add {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 38px; height: 38px;
  padding: 0;
  background: linear-gradient(135deg, var(--cat-consultoria), rgba(6,182,212,0.6));
  border: none;
  border-radius: 50%;
  color: white;
  font-family: inherit;
  cursor: pointer;
  transition: var(--transition);
}
.btn-add:active { transform: scale(0.92); }
.btn-add svg { width: 18px; height: 18px; }
.btn-add-text { display: none; }

.view-toggle {
  display: flex;
  background: var(--bg-glass);
  border: 1px solid var(--border-subtle);
  border-radius: 50px;
  overflow: hidden;
}
.view-toggle button {
  padding: 0.4rem 0.75rem;
  background: none; border: none;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 0.75rem;
  cursor: pointer;
  transition: var(--transition);
}
.view-toggle button.active { color: var(--text-primary); background: rgba(255,255,255,0.08); }

/* ========== STATS BAR (horizontal scroll on mobile) ========== */
.stats-bar {
  display: flex;
  gap: 0.5rem;
  padding: 0.75rem 1rem;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border-subtle);
}
.stats-bar::-webkit-scrollbar { display: none; }

.stat-card {
  flex: 0 0 auto;
  min-width: 90px;
  padding: 0.6rem 0.8rem;
  background: var(--bg-glass);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: var(--transition);
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent, var(--text-muted));
  opacity: 0.6;
}
.stat-card:active { transform: scale(0.96); }
.stat-number {
  font-family: 'Instrument Serif', serif;
  font-size: 1.5rem; font-weight: 400; line-height: 1; margin-bottom: 0.15rem;
}
.stat-label { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; }
.stat-card.total { --accent: var(--text-primary); }
.stat-card.total .stat-number { color: var(--text-primary); }
.stat-card.pending { --accent: var(--pri-media); }
.stat-card.pending .stat-number { color: var(--pri-media); }
.stat-card.done { --accent: var(--cat-pessoal); }
.stat-card.done .stat-number { color: var(--cat-pessoal); }
.stat-card.overdue { --accent: var(--pri-alta); }
.stat-card.overdue .stat-number { color: var(--pri-alta); }
.stat-card.meetings { --accent: var(--cat-consultoria); }
.stat-card.meetings .stat-number { color: var(--cat-consultoria); }

/* ========== FILTER CHIPS (horizontal scroll) ========== */
.filter-bar {
  display: flex;
  gap: 0.4rem;
  padding: 0.6rem 1rem;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }

.chip {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.4rem 0.75rem;
  background: var(--bg-glass);
  border: 1px solid var(--border-subtle);
  border-radius: 50px;
  font-size: 0.75rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  -webkit-user-select: none;
  user-select: none;
}
.chip:active { transform: scale(0.95); }
.chip.active { background: rgba(255,255,255,0.1); border-color: var(--border-hover); color: var(--text-primary); }
.chip .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ========== MAIN CONTENT ========== */
.main { flex: 1; padding: 0.75rem 1rem; overflow-y: auto; }

/* ========== STATUS TABS ========== */
.status-tabs {
  display: flex;
  gap: 0.2rem;
  background: var(--bg-glass);
  border: 1px solid var(--border-subtle);
  border-radius: 50px;
  padding: 3px;
  margin-bottom: 0.75rem;
  overflow-x: auto;
  scrollbar-width: none;
}
.status-tabs::-webkit-scrollbar { display: none; }

.status-tab {
  flex: 1;
  padding: 0.4rem 0.5rem;
  background: none; border: none;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 0.72rem;
  cursor: pointer;
  border-radius: 50px;
  transition: var(--transition);
  white-space: nowrap;
  text-align: center;
}
.status-tab.active { background: rgba(255,255,255,0.08); color: var(--text-primary); }

/* ========== TASK LIST ========== */
.task-list { display: flex; flex-direction: column; gap: 0.5rem; padding-bottom: 1rem; }

.task-card {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  padding: 0.85rem;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  position: relative;
  animation: slideUp 0.35s ease backwards;
  transition: var(--transition);
}
.task-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--cat-color);
  opacity: 0.7;
  border-radius: 3px 0 0 3px;
}

.task-check {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border-hover);
  display: flex;
  align-items: center; justify-content: center;
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
  margin-top: 2px;
}
.task-check:active { transform: scale(0.85); }
.task-card.completed .task-check { background: var(--cat-pessoal); border-color: var(--cat-pessoal); }
.task-card.completed .task-check::after { content: ''; width: 8px; height: 8px; background: white; border-radius: 50%; }

.task-info { flex: 1; min-width: 0; }

.task-title-row {
  display: flex;
  align-items: flex-start;
  gap: 0.4rem;
  margin-bottom: 0.3rem;
  flex-wrap: wrap;
}

.task-title {
  font-size: 0.88rem;
  font-weight: 400;
  line-height: 1.35;
  word-break: break-word;
}
.task-card.completed .task-title { text-decoration: line-through; color: var(--text-muted); }

.task-category-badge {
  font-size: 0.6rem;
  padding: 0.12rem 0.5rem;
  border-radius: 50px;
  font-weight: 500;
  letter-spacing: 0.03em;
  white-space: nowrap;
  flex-shrink: 0;
}

.task-meta {
  font-size: 0.72rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.task-priority { display: flex; align-items: center; gap: 0.25rem; }
.task-priority .dot { width: 5px; height: 5px; border-radius: 50%; }

.task-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.4rem;
  flex-shrink: 0;
}

.task-date-badge {
  font-size: 0.7rem;
  color: var(--text-muted);
  white-space: nowrap;
}
.task-date-badge.overdue { color: var(--pri-alta); }

/* ========== MEETING BADGE ========== */
.meeting-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  font-size: 0.6rem;
  padding: 0.15rem 0.5rem;
  border-radius: 50px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  text-decoration: none;
}
.meeting-badge:active { transform: scale(0.92); }
.meeting-badge.zoom { background: rgba(45,140,255,0.15); color: #2d8cff; }
.meeting-badge.meet { background: rgba(52,168,83,0.15); color: #34a853; }
.meeting-badge.teams { background: rgba(98,100,167,0.15); color: #6264a7; }
.meeting-badge.generic { background: rgba(255,255,255,0.08); color: var(--text-secondary); }

.meeting-icon { width: 10px; height: 10px; }

/* ========== SWIPE ACTIONS (mobile) ========== */
.task-card-wrapper {
  position: relative;
  overflow: hidden;
  border-radius: var(--radius);
}

.swipe-action {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--pri-alta);
  color: white;
  font-size: 0.7rem;
  font-weight: 500;
  z-index: -1;
  border-radius: 0 var(--radius) var(--radius) 0;
}

/* ========== TASK ACTIONS ========== */
.task-actions {
  display: flex;
  gap: 0.3rem;
  align-items: center;
  margin-top: 0.3rem;
}

.task-action-btn {
  width: 28px; height: 28px;
  display: flex;
  align-items: center; justify-content: center;
  background: var(--bg-glass);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  color: var(--text-muted);
  cursor: pointer;
  transition: var(--transition);
  padding: 0;
}
.task-action-btn:hover, .task-action-btn:active {
  color: var(--text-primary);
  border-color: var(--border-hover);
  background: rgba(255,255,255,0.08);
}
.task-action-btn.delete:hover, .task-action-btn.delete:active {
  color: var(--pri-alta);
  border-color: rgba(239,68,68,0.3);
  background: rgba(239,68,68,0.1);
}

/* ========== CALENDAR VIEW ========== */
.calendar-view { display: none; animation: fadeIn 0.4s ease; }
.calendar-view.active { display: block; }
.tasks-view.hidden { display: none; }

.calendar-scroll {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.6rem;
  padding-bottom: 0.5rem;
}

.calendar-day {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 0.85rem;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  transition: var(--transition);
}
.calendar-day.today {
  border-color: rgba(6,182,212,0.3);
  background: rgba(6,182,212,0.04);
  box-shadow: 0 0 20px rgba(6,182,212,0.06);
}
.calendar-day.empty-day { opacity: 0.5; }

.calendar-day-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.6rem;
  padding-bottom: 0.45rem;
  border-bottom: 1px solid var(--border-subtle);
}
.calendar-day-name {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  font-weight: 500;
}
.calendar-day-number {
  font-family: 'Instrument Serif', serif;
  font-size: 1.2rem;
  color: var(--text-secondary);
  line-height: 1;
}
.calendar-day.today .calendar-day-name { color: var(--cat-consultoria); }
.calendar-day.today .calendar-day-number { color: var(--cat-consultoria); }

.calendar-day-tasks {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.calendar-task-count {
  font-size: 0.6rem;
  color: var(--text-muted);
  margin-top: auto;
  padding-top: 0.4rem;
  text-align: center;
}

.calendar-task {
  padding: 0.45rem 0.55rem;
  border-radius: 8px;
  font-size: 0.72rem;
  border-left: 3px solid var(--cat-color);
  background: var(--bg-glass);
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  line-height: 1.3;
}
.calendar-task:active { transform: scale(0.97); background: rgba(255,255,255,0.08); }

.calendar-task-content {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
}

.calendar-task-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 400;
}

.calendar-task-time {
  font-size: 0.6rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 0.25rem;
}

.calendar-task-meeting {
  display: flex;
  align-items: center;
  gap: 0.25rem;
}
.calendar-task-meeting .meeting-icon { width: 8px; height: 8px; }

/* ========== TASK DETAIL OVERLAY ========== */
.detail-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 110;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: var(--transition);
}
.detail-overlay.active { opacity: 1; pointer-events: all; }

.detail-sheet {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 1.5rem 1.25rem calc(1.5rem + var(--safe-bottom));
  width: 100%;
  max-width: 520px;
  transform: translateY(100%);
  transition: var(--transition);
}
.detail-overlay.active .detail-sheet { transform: translateY(0); }

.detail-handle {
  width: 36px; height: 4px;
  background: var(--border-hover);
  border-radius: 2px;
  margin: 0 auto 1.2rem;
}

.detail-category {
  display: inline-block;
  font-size: 0.65rem;
  padding: 0.2rem 0.6rem;
  border-radius: 50px;
  font-weight: 500;
  margin-bottom: 0.6rem;
}

.detail-title {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.3rem;
  line-height: 1.3;
  margin-bottom: 1rem;
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-bottom: 1rem;
}

.detail-field-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 0.2rem;
}

.detail-field-value {
  font-size: 0.85rem;
  color: var(--text-primary);
}

.detail-notes {
  padding: 0.75rem;
  background: var(--bg-glass);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 1rem;
}

.detail-actions {
  display: flex;
  gap: 0.5rem;
}

.detail-btn {
  flex: 1;
  padding: 0.7rem;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 0.82rem;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
}
.detail-btn svg { width: 16px; height: 16px; }
.detail-btn-edit {
  background: var(--bg-glass);
  border: 1px solid var(--border-subtle);
  color: var(--text-primary);
}
.detail-btn-delete {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  color: var(--pri-alta);
}
.detail-btn-close {
  background: none;
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
}

/* ========== BOTTOM NAV (mobile) ========== */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 30;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 0.5rem 0 calc(0.5rem + var(--safe-bottom));
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-subtle);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.2rem;
  padding: 0.3rem 0.8rem;
  background: none; border: none;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 0.6rem;
  cursor: pointer;
  transition: var(--transition);
}
.nav-item.active { color: var(--cat-consultoria); }
.nav-item:active { transform: scale(0.9); }
.nav-item svg { width: 22px; height: 22px; }

.nav-fab {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--cat-consultoria), rgba(6,182,212,0.6));
  border: none;
  color: white;
  display: flex;
  align-items: center; justify-content: center;
  cursor: pointer;
  margin-top: -25px;
  box-shadow: 0 4px 20px rgba(6,182,212,0.3);
  transition: var(--transition);
}
.nav-fab:active { transform: scale(0.9); }
.nav-fab svg { width: 24px; height: 24px; }

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: var(--transition);
}
.modal-overlay.active { opacity: 1; pointer-events: all; }

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 1.5rem 1.25rem calc(1.5rem + var(--safe-bottom));
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  max-height: 90dvh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: var(--transition);
}
.modal-overlay.active .modal { transform: translateY(0); }

.modal-handle {
  width: 36px; height: 4px;
  background: var(--border-hover);
  border-radius: 2px;
  margin: 0 auto 1rem;
}

.modal h2 {

function detectMeetingPlatform(url) {
  if (!url) return null;
  if (url.includes('zoom.us') || url.includes('zoom.com')) return { type: 'zoom', label: 'Zoom', color: '#2d8cff' };
  if (url.includes('meet.google.com')) return { type: 'meet', label: 'Google Meet', color: '#34a853' };
  if (url.includes('teams.microsoft.com') || url.includes('teams.live.com')) return { type: 'teams', label: 'Teams', color: '#6264a7' };
  if (url.startsWith('http')) return { type: 'generic', label: 'Reuniao online', color: '#999' };
  return null;
}

function getMeetingBadgeHTML(url) {
  const platform = detectMeetingPlatform(url);
  if (!platform) return '';
  const icon = '<svg class="meeting-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.5 10l4.72-3.36a1 1 0 011.78.63v9.46a1 1 0 01-1.78.63L15.5 14"/><rect x="2" y="6" width="13.5" height="12" rx="2"/></svg>';
  return `<a href="${url}" target="_blank" rel="noopener" class="meeting-badge ${platform.type}" onclick="event.stopPropagation()">${icon} ${platform.label}</a>`;

let tasks = [];

async function loadTasks() {
  const { data, error } = await sb
    .from('tarefas')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error('Erro ao carregar tarefas:', error);
    document.getElementById('taskList').innerHTML =
      '<div class="empty-state"><p>Erro ao conectar ao banco. Verifique o console.</p></div>';
    return;
  }

  // Converter formato do banco para formato do dashboard
  tasks = (data || []).map(t => ({
    ...t,
    horario: t.horario ? t.horario.substring(0, 5) : '', // "14:00:00" -> "14:00"
  }));

  renderTasks();
  renderCalendar();
}

// ========== SUPABASE: CRIAR TAREFA ==========
async function createTask(taskData) {
  const { data, error } = await sb
    .from('tarefas')
    .insert(taskData)
    .select()
    .single();

  if (error) {
    console.error('Erro ao criar tarefa:', error);
    alert('Erro ao salvar tarefa. Tente novamente.');
    return null;
  }
  return data;
}

async function updateTask(id, updates) {
  const { error } = await sb
    .from('tarefas')
    .update(updates)
    .eq('id', id);

  if (error) {
    console.error('Erro ao atualizar tarefa:', error);
    return false;
  }
  return true;
}

// ========== SUPABASE: EXCLUIR TAREFA ==========
async function removeTask(id) {
  const { error } = await sb
    .from('tarefas')
    .delete()
    .eq('id', id);

  if (error) {
    console.error('Erro ao excluir tarefa:', error);
    return false;

  return true;
}

// Quando QUALQUER coisa muda no banco (ex: bot do Telegram criou tarefa),

function setupRealtime() {
  sb.channel('tarefas-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tarefas' }, () => {
      loadTasks(); // Recarrega tudo quando algo muda
    })
    .subscribe();
}

// ========== HELPERS ==========
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00');
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

function isOverdue(task) {
  if (task.status === 'concluida' || !task.prazo) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const prazo = new Date(task.prazo + 'T12:00:00'); prazo.setHours(0,0,0,0);
  return prazo < today;
}

function getWeekDays() {
  const today = new Date();
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  const days = [];
  const names = ['Seg','Ter','Qua','Qui','Sex','Sab','Dom'];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    days.push({ name: names[i], number: d.getDate(), date: d.toISOString().split('T')[0], isToday: d.toDateString() === today.toDateString() });
  }
  return days;
}

function updateHeaderDate() {
  const now = new Date();
  const f = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('headerDate').textContent = f.charAt(0).toUpperCase() + f.slice(1);
}

// ========== STATS ==========
function updateStats() {
  const total = tasks.length;
  const pending = tasks.filter(t => t.status !== 'concluida').length;
  const done = tasks.filter(t => t.status === 'concluida').length;
  const overdue = tasks.filter(t => isOverdue(t)).length;
  const meetings = tasks.filter(t => t.meeting_link && t.status !== 'concluida').length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statOverdue').textContent = overdue;

  document.getElementById('mStatTotal').textContent = total;
  document.getElementById('mStatPending').textContent = pending;
  document.getElementById('mStatDone').textContent = done;
  document.getElementById('mStatOverdue').textContent = overdue;
  document.getElementById('mStatMeetings').textContent = meetings;

  document.getElementById('countAll').textContent = total;
  document.getElementById('countTrabalho').textContent = tasks.filter(t => t.categoria === 'Trabalho').length;
  document.getElementById('countConsultoria').textContent = tasks.filter(t => t.categoria === 'Consultoria').length;
  document.getElementById('countGrupoSer').textContent = tasks.filter(t => t.categoria === 'Grupo Ser').length;
  document.getElementById('countPessoal').textContent = tasks.filter(t => t.categoria === 'Pessoal').length;
}

// ========== FILTERS ==========
function filterCategory(cat) {
  currentFilters.category = cat;
  document.querySelectorAll('.chip[data-category]').forEach(el => el.classList.toggle('active', el.dataset.category === cat));
  document.querySelectorAll('.category-item').forEach(el => el.classList.toggle('active', el.dataset.category === cat));
  renderTasks();
}

function filterPriority(pri) {
  currentFilters.priority = pri;
  document.querySelectorAll('.priority-item').forEach(el => el.classList.toggle('active', el.dataset.priority === pri));
  renderTasks();
}

function filterStatus(status) {
  currentFilters.status = status;
  document.querySelectorAll('.status-tab').forEach(el => el.classList.toggle('active', el.dataset.status === status));
  renderTasks();
}

function getFilteredTasks() {
  return tasks.filter(t => {
    if (currentFilters.category !== 'all' && t.categoria !== currentFilters.category) return false;
    if (currentFilters.priority !== 'all' && t.prioridade !== currentFilters.priority) return false;
    if (currentFilters.status !== 'all' && t.status !== currentFilters.status) return false;
    return true;
  });
}

// ========== RENDER ==========
function renderTasks() {
  const filtered = getFilteredTasks();
  const container = document.getElementById('taskList');
  const priorityOrder = { 'alta': 0, 'media': 1, 'baixa': 2 };
  const statusOrder = { 'em_andamento': 0, 'pendente': 1, 'concluida': 2 };

  filtered.sort((a, b) => {
    if (statusOrder[a.status] !== statusOrder[b.status]) return statusOrder[a.status] - statusOrder[b.status];
    const ao = isOverdue(a) ? 0 : 1, bo = isOverdue(b) ? 0 : 1;
    if (ao !== bo) return ao - bo;
    if (priorityOrder[a.prioridade] !== priorityOrder[b.prioridade]) return priorityOrder[a.prioridade] - priorityOrder[b.prioridade];
    return (a.prazo || 'z').localeCompare(b.prazo || 'z');
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>Nenhuma tarefa ainda. Toque em + para criar a primeira!</p></div>';
    updateStats();
    return;
  }

  container.innerHTML = filtered.map((task, i) => {
    const catColor = CATEGORY_COLORS[task.categoria] || 'var(--text-muted)';
    const catBg = CATEGORY_BG[task.categoria] || 'rgba(255,255,255,0.05)';
    const priColor = PRIORITY_COLORS[task.prioridade];
    const completed = task.status === 'concluida' ? 'completed' : '';
    const overdueClass = isOverdue(task) ? 'overdue' : '';
    const meetingHTML = getMeetingBadgeHTML(task.meeting_link);
    const timeStr = task.horario || '';

    return `
      <div class="task-card ${completed}" data-task-id="${task.id}" style="--cat-color:${catColor}; animation-delay:${i * 0.04}s">
        <div class="task-check" data-action="toggle"></div>
        <div class="task-info" data-action="detail">
          <div class="task-title-row">
            <span class="task-title">${task.titulo}</span>
            <span class="task-category-badge" style="background:${catBg};color:${catColor}">${task.categoria}</span>
          </div>
          <div class="task-meta">
            <span class="task-priority"><span class="dot" style="background:${priColor}"></span>${PRIORITY_LABELS[task.prioridade]}</span>
            ${timeStr ? '<span>' + timeStr + '</span>' : ''}
            ${meetingHTML}
            ${task.notas && !meetingHTML ? '<span>' + task.notas.substring(0, 30) + (task.notas.length > 30 ? '...' : '') + '</span>' : ''}
          </div>
        </div>
        <div class="task-right">
          <span class="task-date-badge ${overdueClass}">${task.prazo ? formatDate(task.prazo) : ''}</span>
          <div class="task-actions">
            <button class="task-action-btn" data-action="edit" title="Editar">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="task-action-btn delete" data-action="delete" title="Excluir">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            </button>
          </div>
        </div>
      </div>`;
  }).join('');

  updateStats();
}

// ========== EVENT DELEGATION (resolve problemas de UUID nos onclick) ==========
document.getElementById('taskList').addEventListener('click', function(e) {
  const card = e.target.closest('.task-card');
  if (!card) return;
  const taskId = card.dataset.taskId;
  if (!taskId) return;

  const actionEl = e.target.closest('[data-action]');
  if (!actionEl) return;

  const action = actionEl.dataset.action;
  if (action === 'toggle') toggleTask(taskId);
  else if (action === 'delete') deleteTask(taskId);
  else if (action === 'edit') editTask(taskId);
  else if (action === 'detail') showTaskDetail(taskId);
});

// ========== ACTIONS (agora salvam no Supabase!) ==========
let editingTaskId = null; // ID da tarefa sendo editada (null = criando nova)

async function toggleTask(id) {
  const task = tasks.find(t => String(t.id) === String(id));
  if (!task) return;
  const newStatus = task.status === 'concluida' ? 'pendente' : 'concluida';

  task.status = newStatus;
  renderTasks();

  const ok = await updateTask(id, { status: newStatus });
  if (!ok) {
    task.status = task.status === 'concluida' ? 'pendente' : 'concluida';
    renderTasks();
  }
}

async function deleteTask(id) {
  if (!confirm('Excluir esta tarefa?')) return;

  const backup = [...tasks];
  tasks = tasks.filter(t => String(t.id) !== String(id));
  renderTasks();
  renderCalendar();

  const ok = await removeTask(id);
  if (!ok) {
    tasks = backup;
    renderTasks();
  }
}

function editTask(id) {
  const task = tasks.find(t => String(t.id) === String(id));
  if (!task) return;

  editingTaskId = id;
  document.getElementById('inputTitle').value = task.titulo || '';
  document.getElementById('inputCategory').value = task.categoria || 'Trabalho';
  document.getElementById('inputPriority').value = task.prioridade || 'media';
  document.getElementById('inputDate').value = task.prazo || '';
  document.getElementById('inputTime').value = task.horario || '';
  document.getElementById('inputMeetingLink').value = task.meeting_link || '';
  document.getElementById('inputNotes').value = task.notas || '';

  document.querySelector('.modal h2').textContent = 'Editar tarefa';
  document.querySelector('.btn-save').textContent = 'Atualizar';
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(() => document.getElementById('inputTitle').focus(), 300);
}

// ========== CALENDAR ==========
function renderCalendar() {
  const weekDays = getWeekDays();
  const container = document.getElementById('calendarWeek');
  const MAX_VISIBLE = window.innerWidth >= 1024 ? 4 : 3;

  container.innerHTML = weekDays.map(day => {
    const dayTasks = tasks.filter(t => t.prazo === day.date && t.status !== 'concluida');
    dayTasks.sort((a, b) => (a.horario || 'zz').localeCompare(b.horario || 'zz'));
    const todayClass = day.isToday ? 'today' : '';
    const emptyClass = dayTasks.length === 0 ? 'empty-day' : '';
    const visible = dayTasks.slice(0, MAX_VISIBLE);
    const remaining = dayTasks.length - MAX_VISIBLE;

    return `
      <div class="calendar-day ${todayClass} ${emptyClass}">
        <div class="calendar-day-header">
          <span class="calendar-day-name">${day.name}</span>
          <span class="calendar-day-number">${day.number}</span>
        </div>
        <div class="calendar-day-tasks">
          ${visible.length === 0 ? '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:0.65rem;opacity:0.5">Sem tarefas</div>' : ''}
          ${visible.map(t => {
            const platform = detectMeetingPlatform(t.meeting_link);
            const meetIcon = platform ? '<svg class="meeting-icon" viewBox="0 0 24 24" fill="none" stroke="' + platform.color + '" stroke-width="2"><path d="M15.5 10l4.72-3.36a1 1 0 011.78.63v9.46a1 1 0 01-1.78.63L15.5 14"/><rect x="2" y="6" width="13.5" height="12" rx="2"/></svg>' : '';
            const timeStr = t.horario || '';
            return `<div class="calendar-task" style="--cat-color:${CATEGORY_COLORS[t.categoria]}" data-task-id="${t.id}">
              <div class="calendar-task-content">
                <span class="calendar-task-title">${t.titulo}</span>
                ${timeStr || platform ? '<span class="calendar-task-time">' + (timeStr ? timeStr : '') + (platform ? ' ' + meetIcon + ' ' + platform.label : '') + '</span>' : ''}
              </div>
            </div>`;
          }).join('')}
          ${remaining > 0 ? '<div class="calendar-task-count">+' + remaining + ' mais</div>' : ''}
        </div>
      </div>`;
  }).join('');

  // Clique nas tarefas do calendario
  container.querySelectorAll('.calendar-task[data-task-id]').forEach(el => {
    el.addEventListener('click', () => showTaskDetail(el.dataset.taskId));
  });
}

// ========== TASK DETAIL (modal de detalhes) ==========
function showTaskDetail(id) {
  const task = tasks.find(t => String(t.id) === String(id));
  if (!task) return;

  const catColor = CATEGORY_COLORS[task.categoria] || 'var(--text-muted)';
  const catBg = CATEGORY_BG[task.categoria] || 'rgba(255,255,255,0.05)';
  const priColor = PRIORITY_COLORS[task.prioridade];
  const platform = detectMeetingPlatform(task.meeting_link);
  const statusLabels = { 'pendente': 'Pendente', 'em_andamento': 'Em andamento', 'concluida': 'Concluida' };

  let html = `
    <span class="detail-category" style="background:${catBg};color:${catColor}">${task.categoria}</span>
    <h2 class="detail-title">${task.titulo}</h2>
    <div class="detail-grid">
      <div>
        <div class="detail-field-label">Status</div>
        <div class="detail-field-value">${statusLabels[task.status] || task.status}</div>
      </div>
      <div>
        <div class="detail-field-label">Prioridade</div>
        <div class="detail-field-value" style="color:${priColor}">${PRIORITY_LABELS[task.prioridade]}</div>
      </div>
      <div>
        <div class="detail-field-label">Prazo</div>
        <div class="detail-field-value">${task.prazo ? formatDate(task.prazo) : 'Sem prazo'}</div>
      </div>
      <div>
        <div class="detail-field-label">Horario</div>
        <div class="detail-field-value">${task.horario || 'Sem horario'}</div>
      </div>
    </div>`;

  if (platform) {
    html += `<div style="margin-bottom:1rem">
      <a href="${task.meeting_link}" target="_blank" rel="noopener" class="meeting-badge ${platform.type}" style="font-size:0.75rem;padding:0.3rem 0.7rem">
        <svg class="meeting-icon" style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.5 10l4.72-3.36a1 1 0 011.78.63v9.46a1 1 0 01-1.78.63L15.5 14"/><rect x="2" y="6" width="13.5" height="12" rx="2"/></svg>
        ${platform.label}
      </a>
    </div>`;
  }

  if (task.notas) {
    html += `<div class="detail-notes">${task.notas}</div>`;
  }

  html += `
    <div class="detail-actions">
      <button class="detail-btn detail-btn-edit" onclick="closeDetail();editTask('${task.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Editar
      </button>
      <button class="detail-btn detail-btn-delete" onclick="closeDetail();deleteTask('${task.id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Excluir
      </button>
      <button class="detail-btn detail-btn-close" onclick="closeDetail()">Fechar</button>
    </div>`;

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('active');
}

function closeDetail(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('detailOverlay').classList.remove('active');
}

// ========== VIEW SWITCH ==========
function switchView(view) {
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.view === view));

  const tv = document.getElementById('tasksView');
  const cv = document.getElementById('calendarView');

  if (view === 'tasks') {
    tv.classList.remove('hidden');
    cv.classList.remove('active');
  } else {
    tv.classList.add('hidden');
    cv.classList.add('active');
    renderCalendar();
  }
}

// ========== MODAL ==========
function openModal() {
  editingTaskId = null;
  document.querySelector('.modal h2').textContent = 'Nova tarefa';
  document.querySelector('.btn-save').textContent = 'Salvar';
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(() => document.getElementById('inputTitle').focus(), 300);
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('inputDate').value = tomorrow.toISOString().split('T')[0];
}

function closeModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('taskForm').reset();
  editingTaskId = null;
  document.querySelector('.modal h2').textContent = 'Nova tarefa';
  document.querySelector('.btn-save').textContent = 'Salvar';
}

async function saveTask(event) {
  event.preventDefault();

  const meetingLink = document.getElementById('inputMeetingLink').value || '';
  const platform = detectMeetingPlatform(meetingLink);

  const taskData = {
    titulo: document.getElementById('inputTitle').value,
    categoria: document.getElementById('inputCategory').value,
    prioridade: document.getElementById('inputPriority').value,
    prazo: document.getElementById('inputDate').value || null,
    horario: document.getElementById('inputTime').value || null,
    meeting_link: meetingLink,
    meeting_platform: platform ? platform.type : null,
    notas: document.getElementById('inputNotes').value,
  };

  closeModal();

  if (editingTaskId) {
    // EDITANDO tarefa existente
    const ok = await updateTask(editingTaskId, taskData);
    if (ok) {
      const task = tasks.find(t => String(t.id) === String(editingTaskId));
      if (task) {
        Object.assign(task, taskData);
        task.horario = taskData.horario ? taskData.horario.substring(0, 5) : '';
      }
      renderTasks();
      renderCalendar();
    }
    editingTaskId = null;
  } else {
    // CRIANDO nova tarefa
    taskData.status = 'pendente';
    taskData.origem = 'dashboard';
    const created = await createTask(taskData);
    if (created) {
      tasks.unshift({ ...created, horario: created.horario ? created.horario.substring(0, 5) : '' });
      renderTasks();
      renderCalendar();
    }
  }
}

// ========== KEYBOARD ==========
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeModal(); closeDetail(); }
  if (e.key === 'n' && !e.ctrlKey && !e.metaKey && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) openModal();
});

// ========== INIT ==========
updateHeaderDate();
loadTasks();       // Carrega tarefas do Supabase
setupRealtime();   // Escuta mudancas em tempo real
</script>
</body>
</html>
